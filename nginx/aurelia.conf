server {
    listen 80;
    server_name aurelia.audiobuilder.com.br;

    # Redirect to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name aurelia.audiobuilder.com.br;

    # SSL certs (certbot will fill these)
    ssl_certificate /etc/letsencrypt/live/aurelia.audiobuilder.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aurelia.audiobuilder.com.br/privkey.pem;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Upload size limit (match AURELIA_MAX_FILE_SIZE_MB)
    client_max_body_size 510M;

    # Proxy timeouts for long processing
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 600s;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
